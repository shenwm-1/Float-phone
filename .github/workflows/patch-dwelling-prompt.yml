name: Patch dwelling prompt
on:
  push:
    paths:
      - .github/workflows/patch-dwelling-prompt.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Patch prompt and remove runtime injection
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          engine_path = Path('lib/dwelling-engine.ts')
          engine = engine_path.read_text(encoding='utf-8')
          engine = re.sub(r'\n\s*llmMessages\.push\(\{\s*role:\s*"system",\s*content:\s*\[\s*"移动端嵌入要求：[\s\S]*?\}\);\s*\n', '\n', engine, count=1)
          engine_path.write_text(engine, encoding='utf-8')
          preset_path = Path('lib/builtin-preset.ts')
          preset = preset_path.read_text(encoding='utf-8')
          marker = '移动端嵌入要求：请生成适合嵌入 iframe'
          if marker not in preset:
              anchor = '                    "- 页面宽度适配手机（max-width: 350px），背景透明或与粉色主题搭配",\n'
              addition = '                    "- 移动端嵌入要求：请生成适合嵌入 iframe 的普通流式页面；不要给 html、body 或最外层容器设置 height: 100vh、100dvh、overflow: hidden、position: fixed 或 inset: 0；页面高度必须由内容自然撑开，并允许纵向滚动",\n'
              if anchor not in preset:
                  raise SystemExit('dwelling_item_detail anchor not found')
              preset = preset.replace(anchor, anchor + addition, 1)
              preset = re.sub(r'(export const BUILTIN_PRESET_VERSION = )(\d+)', lambda m: m.group(1) + str(int(m.group(2)) + 1), preset, count=1)
          preset_path.write_text(preset, encoding='utf-8')
          Path('.github/patch-write-test.txt').unlink(missing_ok=True)
          Path('.github/workflows/patch-dwelling-prompt.yml').unlink()
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep dwelling item HTML scrollable"
          git push origin HEAD:${{ github.ref_name }}
